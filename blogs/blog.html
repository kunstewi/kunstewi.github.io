<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanai's Blog</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VP1VKLPKJ"></script>
  <script>

    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());
    gtag("config", "G-4VP1VKLPKJ");
  </script>
  <style>
    /* Hide scrollbar for all browsers */
    html {
      overflow: -moz-scrollbars-none;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    html::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    body {
      -ms-overflow-style: none;
      scrollbar-width: none;
      overflow-y: scroll;

      width: 0;

    }
  </style>
</head>

<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">
  <nav class="mt-6">
    <div>
      <h1 class="font-serif text-4xl">Kanai's Blogs</h1>
      <div class="mt-5 flex flex-wrap gap-5">
        <a href="/"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
        <a href="./blog.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
        <a href="../projects/projects.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
        <a href="../prs/prs.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Pull
          Requests</a>
        <a href="../gallery/gallery.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Gallery</a>
      </div>
  </nav>

  <hr class="mt-3" />

  <section class="mt-10 mb-12">
    <div id="blog-list">
      <!-- Blog posts are injected here from blogs.json -->
    </div>
  </section>

  <script>
    const DOC_ICON = `<svg class="size-5 mt-0.5 shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>`;

    function renderBlog(blog) {
      return `
        <div class="group flex items-start gap-2.5 py-1.5">
          ${DOC_ICON}
          <a href="../blogs/${blog.file}"
            class="text-base leading-snug relative after:content-[''] after:absolute after:w-0 after:h-[1px] after:bg-black after:bottom-[-1px] after:left-0 group-hover:after:w-full after:transition-all after:duration-200">${blog.title}</a>
          <span class="ml-auto shrink-0 text-sm text-gray-400 tabular-nums pt-0.5">${blog.date}</span>
        </div>`;
    }

    /** Parse "Mar 06, 2026" into a Date for sorting */
    function parseDate(dateStr) {
      return new Date(dateStr);
    }

    fetch("./blogs.json")
      .then(res => res.json())
      .then(blogs => {
        // Group by year
        const grouped = {};
        blogs.forEach(blog => {
          const year = parseDate(blog.date).getFullYear();
          if (!grouped[year]) grouped[year] = [];
          grouped[year].push(blog);
        });

        // Sort blogs within each year: newest first
        Object.values(grouped).forEach(list =>
          list.sort((a, b) => parseDate(b.date) - parseDate(a.date))
        );

        // Sort years: newest first
        const years = Object.keys(grouped).sort((a, b) => b - a);

        let html = "";
        years.forEach(year => {
          html += `<div class="mt-6">`;
          html += `<h3 class="font-serif text-lg text-gray-500">${year} <span class="text-sm text-gray-400 tabular-nums">(${grouped[year].length})</span></h3>`;
          html += `<div class="mt-2 text-gray-800">`;
          html += grouped[year].map(renderBlog).join("");
          html += `</div></div>`;
        });

        document.getElementById("blog-list").innerHTML = html;
      })
      .catch(err => {
        document.getElementById("blog-list").innerHTML =
          `<p class="text-red-600 font-serif">Failed to load blog list: ${err.message}</p>`;
      });
  </script>
</body>

</html>
