<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">
  <nav class="mt-6">
    <div>
      <h1 class="font-serif text-4xl">Kanai's Blogs</h1>
      <div class="mt-5 flex flex-wrap gap-5">
        <a href="/"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
        <a href="./blog.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
        <a href="../projects/projects.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
        <a href="../prs/prs.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Pull
          Requests</a>
        <a href="../gallery/gallery.html"
          class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Gallery</a>
      </div>
  </nav>

  <hr class="mt-3" />

  <div class="my-8">
    <section>
      <div id="blog-list" class="space-y-6">
        <!-- Blog posts are injected here from blogs.json -->
      </div>
    </section>
  </div>

  <script>
    /**
     * Tag colour palette.
     * Maps a lowercase tag name to Tailwind bg/text classes.
     * Any tag not in this map falls back to the default slate pair.
     */
    const TAG_COLORS = {
      architecture: { bg: "bg-blue-100", text: "text-blue-800" },
      testing: { bg: "bg-indigo-100", text: "text-indigo-800" },
      database: { bg: "bg-red-100", text: "text-red-800" },
      networking: { bg: "bg-green-100", text: "text-green-800" },
      "ai/ml": { bg: "bg-purple-100", text: "text-purple-800" },
      programming: { bg: "bg-yellow-100", text: "text-yellow-800" },
      "open-source": { bg: "bg-teal-100", text: "text-teal-800" },
      security: { bg: "bg-orange-200", text: "text-orange-900" },
      devops: { bg: "bg-cyan-100", text: "text-cyan-800" },
      performance: { bg: "bg-lime-100", text: "text-lime-800" },
      frontend: { bg: "bg-pink-100", text: "text-pink-800" },
      backend: { bg: "bg-amber-100", text: "text-amber-800" },
      "p5.js": { bg: "bg-red-100", text: "text-red-800" },
      "p5.js-web-editor": { bg: "bg-red-100", text: "text-red-800" },

    };

    const DEFAULT_TAG_COLOR = { bg: "bg-blue-100", text: "text-blue-800" };

    function tagClasses(tag) {
      const c = TAG_COLORS[tag.toLowerCase()] || DEFAULT_TAG_COLOR;
      return `${c.bg} ${c.text}`;
    }

    const DOC_ICON = `
      <svg class="size-5 mt-0.5 flex-shrink-0 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>`;

    function renderBlog(blog) {
      const tagsHtml = blog.tags
        .map(tag => `<span class="inline-block px-2 py-0.5 text-xs ${tagClasses(tag)} rounded">${tag}</span>`)
        .join("");

      return `
        <div class="border-l-2 border-orange-600 pl-4 py-2">
          <div class="flex items-start gap-3 group">
            ${DOC_ICON}
            <div class="flex-1">
              <div class="flex items-center gap-2 flex-wrap">
                <a href="../blogs/${blog.file}"
                  class="font-medium relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-2px] after:left-0 group-hover:after:w-full after:transition-all after:duration-300">
                  ${blog.title}
                </a>
                ${tagsHtml}
              </div>
              <div class="flex items-center gap-4 mt-2 text-xs text-gray-600">
                <span>• Published on ${blog.date}</span>
                <span>• ${blog.readingTime} min read</span>
                <span>• ${blog.depth}</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    fetch("./blogs.json")
      .then(res => res.json())
      .then(blogs => {
        document.getElementById("blog-list").innerHTML = blogs.map(renderBlog).join("");
      })
      .catch(err => {
        document.getElementById("blog-list").innerHTML =
          `<p class="text-red-600 font-serif">Failed to load blog list: ${err.message}</p>`;
      });
  </script>
</body>

</html>
