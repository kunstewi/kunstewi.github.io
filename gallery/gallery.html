<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../blogs/assets/favicon.ico" type="image/x-icon">
    <title>Kanai's Gallery</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @theme {
            --font-sans: "Lexend", sans-serif;
            --font-serif: "Lexend", sans-serif;
        }
    </style>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VP1VKLPKJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() {
            dataLayer.push(arguments);
        }
        gtag("js", new Date());
        gtag("config", "G-4VP1VKLPKJ");
    </script>
    <style>
        /* Hide scrollbar for all browsers */
        html {
            overflow: -moz-scrollbars-none;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overflow-y: scroll;
        }

        body::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
    </style>
</head>

<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">
    <nav class="mt-6">
        <div>
            <h1 class="font-serif text-4xl">Kanai's Gallery</h1>
            <div class="mt-5 flex flex-wrap gap-5">
                <a href="/"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
                <a href="../blogs/blog.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
                <a href="../projects/projects.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
                <a href="../prs/prs.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Pull
                    Requests</a>
                <a href="../gallery/gallery.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Gallery</a>
            </div>
    </nav>

    <hr class="mt-3" />

    <div class="my-12">
        <!-- Gallery Grid -->
        <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Items injected from gallery.json -->
        </div>
    </div>

    <script>
        function renderItem(item) {
            return `
                <div class="group cursor-pointer">
                    <div class="relative bg-white border border-gray-300 rounded-xl overflow-hidden transition-all duration-300 ease-out hover:border-gray-400 hover:shadow-xl hover:-translate-y-1">
                        <div class="aspect-[4/3] overflow-hidden">
                            <img src="${item.file}" alt="${item.alt}"
                                class="w-full h-full object-cover transition-transform duration-500 ease-out group-hover:scale-110" />
                        </div>
                        <div class="absolute inset-0 bg-black opacity-0 group-hover:opacity-10 transition-opacity duration-300"></div>
                    </div>
                    <p class="mt-3 text-sm text-gray-800 font-mono tracking-wide">${item.caption}</p>
                </div>`;
        }

        fetch("./gallery.json")
            .then(res => res.json())
            .then(items => {
                document.getElementById("gallery-grid").innerHTML = items.map(renderItem).join("");
            })
            .catch(err => {
                document.getElementById("gallery-grid").innerHTML =
                    `<p class="text-red-600 font-serif col-span-full">Failed to load gallery: ${err.message}</p>`;
            });
    </script>
</body>

</html>
