<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="../blogs/assets/favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VP1VKLPKJ"></script>
    <script>

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag("js", new Date());
        gtag("config", "G-4VP1VKLPKJ");
    </script>
    <style>
        /* Hide scrollbar for all browsers */
        html {
            overflow: -moz-scrollbars-none;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;

            height: 0;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overflow-y: scroll;

        body::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
    </style>
</head>

<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">
    <nav class="mt-6">
        <div>
            <h1 class="font-serif text-4xl">Kanai's Pull Requests</h1>
            <div class="mt-5 flex flex-wrap gap-5">
                <a href="/"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
                <a href="../blogs/blog.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
                <a href="../projects/projects.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
                <a href="./prs.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Pull
                    Requests</a>
                <a href="../gallery/gallery.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Gallery</a>
            </div>
    </nav>

    <hr class="mt-3" />

    <div class="my-8">
        <div id="pr-list">
            <!-- PR entries are injected here from prs.json -->
        </div>
    </div>

    <script>
        /** Extract year from date string like "Mar 06, 2026" */
        function getYear(dateStr) {
            return dateStr.trim().split(", ").pop();
        }

        const MERGED_ICON = `<svg class="size-4 shrink-0 text-purple-600" viewBox="0 0 16 16" fill="currentColor"><path d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm8-9a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM4.25 4a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"></path></svg>`;

        function renderPR(pr) {
            return `
                <div class="group flex items-center gap-3 py-2.5">
                    ${MERGED_ICON}
                    <span class="shrink-0 text-sm text-gray-400 tabular-nums">${pr.mergedOn}</span>
                    <a href="${pr.url}" target="_blank" rel="noopener noreferrer"
                        class="relative after:content-[''] after:absolute after:w-0 after:h-[1px] after:bg-black after:bottom-[-2px] after:left-0 group-hover:after:w-full after:transition-all after:duration-200">
                        ${pr.title}
                    </a>
                    <span class="shrink-0 text-sm text-gray-400">${pr.repo}</span>
                </div>`;
        }

        fetch("./prs.json")
            .then(res => res.json())
            .then(prs => {
                const grouped = {};
                prs.forEach(pr => {
                    const year = getYear(pr.mergedOn);
                    if (!grouped[year]) grouped[year] = [];
                    grouped[year].push(pr);
                });

                const years = Object.keys(grouped).sort((a, b) => b - a);
                let html = "";

                years.forEach(year => {
                    html += `<h2 class="font-serif text-lg mt-6 mb-2 text-gray-500">${year}</h2>`;
                    html += `<div class="divide-y divide-gray-200">`;
                    html += grouped[year].map(renderPR).join("");
                    html += `</div>`;
                });

                document.getElementById("pr-list").innerHTML = html;
            })
            .catch(err => {
                document.getElementById("pr-list").innerHTML =
                    `<p class="text-red-600 font-serif">Failed to load pull requests: ${err.message}</p>`;
            });
    </script>
</body>

</html>
