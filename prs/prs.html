<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanai's Pull Requests</title>
    <link rel="icon" href="../blogs/assets/favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4VP1VKLPKJ"></script>
    <script>

        function gtag() {

        gtag("js", new Date());
        gtag("config", "G-4VP1VKLPKJ");
    </script>
    <style>
        /* Hide scrollbar for all browsers */
        html {
            overflow: -moz-scrollbars-none;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overflow-y: scroll;
        }

        body::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
    </style>
</head>

<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">
    <nav class="mt-6">
        <div>
            <h1 class="font-serif text-4xl">Kanai's Pull Requests</h1>
            <div class="mt-5 flex flex-wrap gap-5">
                <a href="/"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
                <a href="../blogs/blog.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
                <a href="../projects/projects.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
                <a href="./prs.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Pull
                    Requests</a>
                <a href="../gallery/gallery.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Gallery</a>
            </div>
    </nav>

    <hr class="mt-3" />

    <div class="my-8">
        <section>
            <div id="pr-list" class="space-y-6">
                <!-- PR cards are injected here from prs.json -->
            </div>
        </section>
    </div>

    <script>
        /**
         * Label colour palette.
         * Maps a lowercase label to Tailwind bg/text classes.
         * Falls back to slate for anything not listed.
         */
        const LABEL_COLORS = {
            feature: { bg: "bg-green-100", text: "text-green-800" },
            performance: { bg: "bg-blue-100", text: "text-blue-800" },
            "bug fix": { bg: "bg-red-100", text: "text-red-800" },
            fix: { bg: "bg-red-100", text: "text-red-800" },
            documentation: { bg: "bg-yellow-100", text: "text-yellow-800" },
            docs: { bg: "bg-yellow-100", text: "text-yellow-800" },
            refactor: { bg: "bg-purple-100", text: "text-purple-800" },
            chore: { bg: "bg-gray-200", text: "text-gray-700" },
            test: { bg: "bg-cyan-100", text: "text-cyan-800" },
            security: { bg: "bg-orange-100", text: "text-orange-800" },
            breaking: { bg: "bg-pink-100", text: "text-pink-800" },
            other: { bg: "bg-pink-100", text: "text-pink-800" },
        };

        const DEFAULT_LABEL_COLOR = { bg: "bg-blue-100", text: "text-blue-700" };

        function labelClasses(label) {
            const c = LABEL_COLORS[label.toLowerCase()] || DEFAULT_LABEL_COLOR;
            return `${c.bg} ${c.text}`;
        }

        /** Format numbers with commas: 1234 → "1,234" */
        function fmt(n) {
            return Number(n).toLocaleString();
        }

        const PR_ICON = `
            <svg class="size-5 mt-0.5 flex-shrink-0 text-purple-600" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                    d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z" />
            </svg>`;

        function renderPR(pr) {
            return `
                <div class="border-l-2 border-purple-600 pl-4 py-2">
                    <div class="flex items-start gap-3 group">
                        ${PR_ICON}
                        <div class="flex-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <a href="${pr.url}"
                                    class="font-medium relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-2px] after:left-0 group-hover:after:w-full after:transition-all after:duration-300">
                                    ${pr.title}
                                </a>
                                <span class="inline-block px-2 py-0.5 text-xs ${labelClasses(pr.label)} rounded">${pr.label}</span>
                                <span class="inline-block px-2 py-0.5 text-xs bg-blue-100 text-blue-800 rounded">${pr.repo}</span>
                            </div>
                            <div class="flex items-center gap-4 mt-2 text-xs text-gray-600">
                                <span>• Merged on ${pr.mergedOn}</span>
                                <span>• ${pr.filesChanged} file${pr.filesChanged === 1 ? "" : "s"} changed</span>
                                <span class="text-green-600">+${fmt(pr.additions)}</span>
                                <span class="text-red-600">-${fmt(pr.deletions)}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        fetch("./prs.json")
            .then(res => res.json())
            .then(prs => {
                document.getElementById("pr-list").innerHTML = prs.map(renderPR).join("");
            })
            .catch(err => {
                document.getElementById("pr-list").innerHTML =
                    `<p class="text-red-600 font-serif">Failed to load pull requests: ${err.message}</p>`;
            });
    </script>
</body>

</html>
