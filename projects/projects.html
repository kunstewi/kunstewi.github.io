<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">

        <div>
            <h1 class="font-serif text-4xl">Kanai's Projects</h1>
            <div class="mt-5 flex flex-wrap gap-5">
                <a href="/"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
                <a href="../blogs/blog.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
                <a href="./projects.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
                <a href="../prs/prs.html"

            </div>

    <hr class="mt-3" />

    <div class="my-8">
        <section>
            <div id="project-list" class="space-y-6">
                <!-- Project cards are injected here from projects.json -->
            </div>
        </section>
    </div>

    <script>
        /**
         * Tag colour palette.
         * Maps a lowercase tag name to Tailwind bg/text classes.
         * Any tag not in this map falls back to the default slate pair.
         */
        const TAG_COLORS = {
            backend: { bg: "bg-blue-100", text: "text-blue-800" },
            fullstack: { bg: "bg-purple-100", text: "text-purple-800" },
            infrastructure: { bg: "bg-green-100", text: "text-green-800" },
            frontend: { bg: "bg-pink-100", text: "text-pink-800" },
            devops: { bg: "bg-cyan-100", text: "text-cyan-800" },
            // languages
            go: { bg: "bg-sky-100", text: "text-sky-800" },
            python: { bg: "bg-yellow-100", text: "text-yellow-800" },
            typescript: { bg: "bg-indigo-100", text: "text-indigo-800" },
            "node.js": { bg: "bg-lime-100", text: "text-lime-800" },
            rust: { bg: "bg-orange-100", text: "text-orange-800" },
            // tech / tools
            redis: { bg: "bg-red-100", text: "text-red-800" },
            docker: { bg: "bg-blue-100", text: "text-blue-800" },
            kubernetes: { bg: "bg-teal-100", text: "text-teal-800" },
            helm: { bg: "bg-violet-100", text: "text-violet-800" },
            postgresql: { bg: "bg-indigo-100", text: "text-indigo-800" },
            mongodb: { bg: "bg-green-100", text: "text-green-800" },
            react: { bg: "bg-cyan-100", text: "text-cyan-800" },
            fastapi: { bg: "bg-emerald-100", text: "text-emerald-800" },
            rabbitmq: { bg: "bg-orange-100", text: "text-orange-800" },
            jenkins: { bg: "bg-amber-100", text: "text-amber-800" },
        };

        const DEFAULT_TAG_COLOR = { bg: "bg-slate-100", text: "text-slate-700" };

        function tagClasses(tag) {
            const c = TAG_COLORS[tag.toLowerCase()] || DEFAULT_TAG_COLOR;
            return `${c.bg} ${c.text}`;
        }

        const CODE_ICON = `
            <svg class="size-5 mt-0.5 flex-shrink-0 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>`;

        function renderProject(project) {
            const tagsHtml = project.tags
                .map(tag => `<span class="inline-block px-2 py-0.5 text-xs ${tagClasses(tag)} rounded">${tag}</span>`)
                .join("");

            const bulletsHtml = project.bullets
                .map(b => `<li>${b}</li>`)
                .join("");

            const githubBtn = project.github
                ? `<a href="${project.github}" aria-label="View GitHub repository for ${project.title}"
                        class="px-4 py-1.5 bg-black text-white text-xs font-semibold rounded hover:bg-gray-800 transition-all duration-200">
                        GitHub
                    </a>`
                : "";

            const demoBtn = project.demo
                ? `<a href="${project.demo}" aria-label="View live demo for ${project.title}"
                        class="px-4 py-1.5 border border-black text-black text-xs font-semibold rounded hover:bg-black hover:text-white transition-all duration-200">
                        Demo
                    </a>`
                : "";

            return `
                <div class="border-l-2 border-black pl-4 py-2">
                    <div class="flex items-start gap-3 group">
                        ${CODE_ICON}
                        <div class="flex-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <a href="${project.github || '#'}"
                                    class="font-medium relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-2px] after:left-0 group-hover:after:w-full after:transition-all after:duration-300">
                                    ${project.title}
                                </a>
                                ${tagsHtml}
                            </div>
                            <ul class="text-sm text-gray-700 mt-2 list-disc list-inside space-y-1">
                                ${bulletsHtml}
                            </ul>
                            <div class="flex gap-3 mt-3">
                                ${githubBtn}
                                ${demoBtn}
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        fetch("./projects.json")
            .then(res => res.json())
            .then(projects => {
                document.getElementById("project-list").innerHTML = projects.map(renderProject).join("");
            })
            .catch(err => {
                document.getElementById("project-list").innerHTML =
                    `<p class="text-red-600 font-serif">Failed to load projects: ${err.message}</p>`;
            });
    </script>
</body>

</html>
