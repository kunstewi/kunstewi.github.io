<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">
    <nav class="mt-6">
        <div>
            <h1 class="font-serif text-4xl">Kanai's Projects</h1>
            <div class="mt-5 flex flex-wrap gap-5">
                <a href="/"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
                <a href="../blogs/blog.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
                <a href="./projects.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
                <a href="../prs/prs.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Pull
                    Requests</a>
                <a href="../gallery/gallery.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Gallery</a>
            </div>
    </nav>

    <hr class="mt-3" />

    <div class="my-8">
        <section>
            <div id="project-list" class="divide-y divide-gray-300">
                <!-- Project cards are injected here from projects.json -->
            </div>
        </section>
    </div>

    <script>



        function renderProject(project) {
            const techStack = project.tags.join(", ");

            const bulletsHtml = project.bullets
                .map(b => `<li>${b}</li>`)
                .join("");

            const githubLink = project.github
                ? `<a href="${project.github}" aria-label="View GitHub repository for ${project.title}"
                        class="text-gray-400 hover:text-black transition-colors duration-200">
                        <svg class="size-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                    </a>`
                : "";

            const demoLink = project.demo
                ? `<a href="${project.demo}" aria-label="View live demo for ${project.title}"
                        class="text-gray-400 hover:text-black transition-colors duration-200">
                        <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>`
                : "";

            const linkSeparator = githubLink && demoLink
                ? ``
                : "";

            return `
                <div class="py-5 first:pt-0 group">
                    <div class="flex items-baseline gap-3 flex-wrap">
                        <a href="${project.github || '#'}"
                            class="font-medium relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-2px] after:left-0 group-hover:after:w-full after:transition-all after:duration-300">
                            ${project.title}
                        </a>
                        ${githubLink}
                        ${linkSeparator}
                        ${demoLink}
                    </div>
                    <ul class="text-sm text-gray-600 mt-1.5 list-disc list-inside space-y-0.5">
                        ${bulletsHtml}
                        <li class="text-gray-500 font-medium">${techStack}</li>
                    </ul>
                </div>`;
        }

        fetch("./projects.json")
            .then(res => res.json())
            .then(projects => {
                document.getElementById("project-list").innerHTML = projects.map(renderProject).join("");
            })
            .catch(err => {
                document.getElementById("project-list").innerHTML =
                    `<p class="text-red-600 font-serif">Failed to load projects: ${err.message}</p>`;
            });
    </script>
</body>

</html>
