<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style type="text/tailwindcss">

            --font-serif: "Lexend", sans-serif;
        }
    </style>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

<body class="bg-orange-100 w-full max-w-[95%] md:w-[70%] mx-auto">
    <nav class="mt-6">
        <div>
            <h1 class="font-serif text-4xl text-balance">Kanai's Projects</h1>
            <div class="mt-5 flex flex-wrap gap-5">
                <a href="/"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Home</a>
                <a href="../blogs/blog.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Blogs</a>
                <a href="./projects.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Projects</a>
                <a href="../prs/prs.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Pull
                    Requests</a>
                <a href="../gallery/gallery.html"
                    class="relative after:content-[''] after:absolute after:w-0 after:h-[2px] after:bg-black after:bottom-[-4px] after:left-0 hover:after:w-full after:transition-all after:duration-300">Gallery</a>
            </div>
    </nav>

    <hr class="mt-3" />

    <!-- Featured Projects -->
    <section id="featured-section" class="mt-8"></section>

    <!-- All Other Projects by Category -->
    <section id="projects-section" class="mt-10 mb-16"></section>

    <script>
        const CATEGORY_LABELS = {
            fullstack: "Full-Stack Applications",
            backend: "Backend & APIs",
            frontend: "Frontend & Landing Pages",
            other: "Other"
        };

        const CATEGORY_ORDER = ["fullstack", "backend", "frontend", "other"];

        function renderTag(tag) {
            return `<span class="px-2 py-0.5 bg-black/5 rounded text-[10px] font-mono whitespace-nowrap text-gray-700">${tag.trim()}</span>`;
        }

        function renderFeaturedCard(project) {
            const tags = project.tags.split(',').map(t => renderTag(t)).join('');
            return `
                <a href="${project.url}" target="_blank" rel="noopener noreferrer"
                   class="block border border-black/10 rounded-lg p-5 hover:border-black/25 transition-colors duration-200 group">
                    <div class="flex items-start justify-between gap-3">
                        <h3 class="font-semibold text-base text-black group-hover:underline underline-offset-4 decoration-1">${project.title}</h3>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke-width="1.5" stroke="currentColor"
                            class="size-4 shrink-0 mt-1 text-gray-400 group-hover:text-black transition-colors duration-200">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25" />
                        </svg>
                    </div>
                    <p class="text-sm text-gray-600 mt-2 leading-relaxed text-pretty">${project.description}</p>
                    <div class="flex flex-wrap gap-1.5 mt-3">${tags}</div>
                </a>`;
        }

        function renderListItem(project) {
            const tags = project.tags.split(',').map(t => renderTag(t)).join('');
            return `
                <li class="flex items-start gap-3 py-1.5">
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke-width="1.5" stroke="currentColor"
                        class="size-4 mt-[3px] text-gray-500 shrink-0">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244" />
                    </svg>
                    <div class="flex flex-col gap-1">
                        <div class="flex flex-wrap items-center gap-2">
                            <a href="${project.url}" target="_blank" rel="noopener noreferrer"
                                class="font-medium text-black text-sm relative after:content-[''] after:absolute after:w-0 after:h-[1px] after:bg-black after:bottom-[-2px] after:left-0 hover:after:w-full after:transition-all after:duration-300">
                                ${project.title}
                            </a>
                            <div class="flex flex-wrap items-center gap-1">${tags}</div>
                        </div>
                        <p class="text-xs text-gray-500 text-pretty">${project.description}</p>
                    </div>
                </li>`;
        }

        fetch("./projects.json")
            .then(res => res.json())
            .then(projects => {
                // Featured
                const featured = projects.filter(p => p.category === "featured");
                const featuredEl = document.getElementById("featured-section");
                if (featured.length) {
                    featuredEl.innerHTML = `
                        <h2 class="text-xs font-semibold tracking-widest uppercase text-gray-500 mb-4">Notable Projects</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            ${featured.map(renderFeaturedCard).join('')}
                        </div>`;
                }

                // Grouped
                const grouped = {};
                projects.filter(p => p.category !== "featured").forEach(p => {
                    if (!grouped[p.category]) grouped[p.category] = [];
                    grouped[p.category].push(p);
                });

                const sectionsHtml = CATEGORY_ORDER
                    .filter(cat => grouped[cat] && grouped[cat].length)
                    .map(cat => `
                        <div class="mb-8">
                            <h2 class="text-xs font-semibold tracking-widest uppercase text-gray-500 mb-3">${CATEGORY_LABELS[cat]}</h2>
                            <ul class="flex flex-col gap-1 pl-0">
                                ${grouped[cat].map(renderListItem).join('')}
                            </ul>
                        </div>`)
                    .join('');

                document.getElementById("projects-section").innerHTML = sectionsHtml;
            })
            .catch(err => {
                document.getElementById("featured-section").innerHTML =
                    `<p class="text-red-600 font-serif">Failed to load projects: ${err.message}</p>`;
            });
    </script>
</body>

</html>
